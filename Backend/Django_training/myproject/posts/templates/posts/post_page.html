{% extends 'layout.html' %}

{% block title %}
    {{ post.title }}
{% endblock %}

{% block content %}
<section>
    <div class="banner_container">
         <img class="banner" src="{{ post.banner.url }}" alt="{{ post.title }}">
    </div>
   
      <h1>{{post.title}}</h1>
      <p>{{ post.date }}</p>
      <p>{{ post.body }}</p>
</section>
{% endblock %}
