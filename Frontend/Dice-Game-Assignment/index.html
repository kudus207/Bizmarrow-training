<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-container">
    <h1 id="lets-play">Let's Play</h1>
    <p>Player 1 Score:<span id="score-count1"> 0</span></p>
    <p>Player 2 Score:<span id="score-count2"> 0</span></p>
    <div class="container">
        <div class="player">
            <h2 id="player1">Player 1</h2>
            <img id="dice1" src="Images/dice3.png" alt="Dice 1">
        </div>
        <div class="player">
            <h2 id="player2">Player 2</h2>
            <img id="dice2" src="Images/dice6.png" alt="Dice 2">
        </div>
  </div>
  <div class="button-container">
        <button class="roll-dice" id="roll-dice">Roll the Dice</button>
        <button class="edit-name" id="edit-name">Edit Names</button>
  </div>    
</body>
    <script src="script.js"></script>
</html>
